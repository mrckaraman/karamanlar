name: admin_app
description: Admin app for Karamanlar Ticaret
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_crashlytics: ^4.0.0
  core:
    path: ../../packages/core
  supabase_flutter: ^2.6.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  logging: ^1.2.0
  cupertino_icons: ^1.0.6
  file_picker: ^8.0.0
  excel: ^4.0.2
  intl: ^0.19.0
  web: ^1.1.1
  mobile_scanner: ^5.0.0
  path_provider: ^2.1.2
  path: ^1.9.0
  share_plus: ^7.2.1
  cross_file: ^0.3.4+2
  open_filex: ^4.4.0
  pdf: ^3.10.7
  printing: ^5.12.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.0
  just_audio: ^0.9.38

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/Karamanlar_Yonetici_Uygulama.png
    - assets/sounds/beep.mp3
    - assets/sounds/error.mp3
    - assets/fonts/
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSans-Italic.ttf
          style: italic

flutter_launcher_icons:
  android: true
  image_path: "assets/images/Karamanlar_Yonetici_Uygulama.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Karamanlar_Yonetici_Uygulama.png"
