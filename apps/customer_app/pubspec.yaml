name: customer_app
description: Customer app for Karamanlar Ticaret
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_crashlytics: ^4.0.0
  core:
    path: ../../packages/core
  supabase_flutter: ^2.6.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  cupertino_icons: ^1.0.6
  mobile_scanner: ^5.0.0
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.13.1
  path_provider: ^2.1.3
  share_plus: ^7.2.1
  http: ^1.2.0
  shared_preferences: ^2.5.4
  just_audio: ^0.9.38

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/Karamanlar_Ticaret_Uygulama.png
    - assets/sounds/beep.mp3
    - assets/sounds/error.mp3
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

flutter_launcher_icons:
  android: true
  image_path: "assets/images/Karamanlar_Ticaret_Uygulama.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Karamanlar_Ticaret_Uygulama.png"
