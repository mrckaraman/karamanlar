permissions:
  contents: read

concurrency:
  group: firebase-hosting-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy admin_app web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get (admin_app)
        working-directory: apps/admin_app
        run: flutter pub get

      # Provide Supabase + Firebase web config via dart-define-from-file.
      # The workflow creates the json file at build time so it is never stored in git.
      - name: Create .dart-define-admin-web.json
        shell: bash
        run: |
          if [[ -z "${{ secrets.ADMIN_WEB_DART_DEFINES_JSON_B64 }}" ]]; then
            echo "Missing secret: ADMIN_WEB_DART_DEFINES_JSON_B64" >&2
            exit 1
          fi
          echo "${{ secrets.ADMIN_WEB_DART_DEFINES_JSON_B64 }}" | base64 --decode > apps/admin_app/.dart-define-admin-web.json

      - name: Build Flutter Web (release)
        working-directory: apps/admin_app
        run: flutter build web --release --dart-define-from-file=.dart-define-admin-web.json

      # Deploy to Firebase Hosting using Firebase CLI.
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [[ -z "${FIREBASE_TOKEN}" ]]; then
            echo "Missing secret: FIREBASE_TOKEN" >&2
            exit 1
          fi
          if [[ -z "${FIREBASE_PROJECT_ID}" ]]; then
            echo "Missing secret: FIREBASE_PROJECT_ID" >&2
            exit 1
          fi

          # Uses root firebase.json (public: apps/admin_app/build/web)
          npx --yes firebase-tools deploy --only hosting --project "${FIREBASE_PROJECT_ID}"
