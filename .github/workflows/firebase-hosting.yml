name: Deploy Admin Web to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Minimal permissions required for checkout and deploy action.
permissions:
  contents: read

# Prevent overlapping deploys for the same ref.
concurrency:
  group: firebase-hosting-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install Flutter SDK
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Resolve dependencies (monorepo-safe)
      - name: Flutter pub get (admin_app)
        working-directory: apps/admin_app
        run: flutter pub get

      # Build release web output.
      # Note: Root firebase.json uses "public": "apps/admin_app/build/web".
      - name: Build Flutter Web (release)
        working-directory: apps/admin_app
        run: flutter build web --release

      # Deploy to Firebase Hosting (live channel)
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: studio-496411193-44315
          channelId: live
